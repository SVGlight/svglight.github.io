<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crash — Nightfall Casino</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

<header id="topbar">
<div class="top-left">
<a href="index.html" class="logo">
<span class="logo-icon">♠</span>
<span class="logo-text">Nightfall</span>
</a>
</div>

<div class="top-right">
<div class="wallet">
<span class="wallet-label">Balance</span>
<span class="wallet-amount" id="balanceDisplay">$0.00</span>
</div>
</div>
</header>

<div id="content">

<section class="hero">
<div class="hero-text">
<h1>Crash</h1>
<p>
Watch the multiplier rise. Cash out before it crashes.
</p>
</div>
</section>

<section class="crash-controls">

<div class="control-group">
<label>Bet Amount</label>
<input type="number" id="betInput" value="10" min="1">
</div>

<div class="control-group buttons">
<button id="betButton">Place Bet</button>
<button id="cashoutButton" disabled>Cash Out</button>
</div>

<div class="crash-stats">
<div class="stat">
<span>Multiplier</span>
<strong id="multiplier">1.00x</strong>
</div>
<div class="stat">
<span>Status</span>
<strong id="status">Waiting</strong>
</div>
</div>

</section>

<section class="crash-display">
<div class="crash-line"></div>
</section>

</div>
</div>

<script src="script.js"></script>

<script>
let gameRunning = false
let betPlaced = false
let betAmount = 0
let multiplier = 1
let crashPoint = 0
let animationFrame = null
let lastTime = null

const betInput = document.getElementById("betInput")
const betButton = document.getElementById("betButton")
const cashoutButton = document.getElementById("cashoutButton")
const multiplierEl = document.getElementById("multiplier")
const statusEl = document.getElementById("status")
const crashLine = document.querySelector(".crash-line")

function resetGame() {
gameRunning = false
betPlaced = false
multiplier = 1
crashPoint = 0
lastTime = null
cancelAnimationFrame(animationFrame)
multiplierEl.innerText = "1.00x"
statusEl.innerText = "Waiting"
cashoutButton.disabled = true
betButton.disabled = false
crashLine.style.transform = "scaleX(0)"
}

function placeCrashBet() {
if (betPlaced) return

betAmount = Number(betInput.value)
if (!placeBet(betAmount)) {
showTempMessage("Insufficient balance")
return
}

betPlaced = true
betButton.disabled = true
statusEl.innerText = "Bet Placed"
setTimeout(startRound, 600)
}

function startRound() {
gameRunning = true
multiplier = 1
crashPoint = generateCrashPoint()
statusEl.innerText = "Running"
cashoutButton.disabled = false
animationFrame = requestAnimationFrame(step)
}

function generateCrashPoint() {
let r = Math.random()
if (r < 0.02) return randomFloat(1, 1.2)
if (r < 0.15) return randomFloat(1.2, 2)
if (r < 0.45) return randomFloat(2, 5)
if (r < 0.8) return randomFloat(5, 20)
return randomFloat(20, 100)
}

function step(timestamp) {
if (!lastTime) lastTime = timestamp
const delta = timestamp - lastTime
lastTime = timestamp

multiplier += delta * 0.0008 * Math.max(1, multiplier * 0.12)
updateUI()

if (multiplier >= crashPoint) {
crash()
return
}

animationFrame = requestAnimationFrame(step)
}

function updateUI() {
multiplierEl.innerText = multiplier.toFixed(2) + "x"
crashLine.style.transform = `scaleX(${Math.min(multiplier / crashPoint, 1)})`
}

function cashout() {
if (!gameRunning) return
const payoutAmount = betAmount * multiplier
payout(payoutAmount)
showTempMessage("Cashed out $" + payoutAmount.toFixed(2))
endRound()
}

function crash() {
statusEl.innerText = "Crashed"
showTempMessage("Crashed at " + multiplier.toFixed(2) + "x")
endRound(true)
}

function endRound(crashed = false) {
gameRunning = false
cashoutButton.disabled = true
setTimeout(() => {
resetGame()
}, 1500)
}

betButton.addEventListener("click", placeCrashBet)
cashoutButton.addEventListener("click", cashout)

resetGame()
renderBalance()
</script>

<style>
.crash-controls {
display:flex;
flex-wrap:wrap;
gap:20px;
margin-bottom:30px;
align-items:flex-end;
}

.crash-stats {
display:flex;
gap:24px;
margin-left:auto;
}

.stat {
display:flex;
flex-direction:column;
gap:4px;
font-size:14px;
}

.stat span {
color:var(--text-muted);
}

.stat strong {
font-size:20px;
}

.crash-display {
height:200px;
background:var(--bg-card);
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:var(--shadow-card);
}

.crash-line {
width:80%;
height:6px;
background:linear-gradient(90deg, var(--accent), var(--success));
border-radius:6px;
transform-origin:left;
transform:scaleX(0);
transition:transform .05s linear;
}

#betButton {
background:var(--accent);
color:#fff;
}

#cashoutButton {
background:var(--success);
color:#000;
}

#cashoutButton:disabled {
opacity:.5;
cursor:not-allowed;
}
</style>

</body>
</html>
