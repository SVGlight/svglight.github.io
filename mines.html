<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mines — Nightfall Casino</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

<header id="topbar">
<div class="top-left">
<a href="index.html" class="logo">
<span class="logo-icon">♠</span>
<span class="logo-text">Nightfall</span>
</a>
</div>

<div class="top-right">
<div class="wallet">
<span class="wallet-label">Balance</span>
<span class="wallet-amount" id="balanceDisplay">$0.00</span>
</div>
</div>
</header>

<div id="content">

<section class="hero">
<div class="hero-text">
<h1>Mines</h1>
<p>
Click tiles to reveal gems. Avoid the mines. Cash out anytime.
</p>
</div>
</section>

<section class="mines-controls">

<div class="control-group">
<label>Bet Amount</label>
<input type="number" id="betInput" value="10" min="1">
</div>

<div class="control-group">
<label>Mines</label>
<select id="mineCount">
<option value="3">3</option>
<option value="5">5</option>
<option value="8">8</option>
<option value="12">12</option>
</select>
</div>

<div class="control-group buttons">
<button id="startGame">Start</button>
<button id="cashoutGame" disabled>Cash Out</button>
</div>

<div class="multiplier-display">
<span>Multiplier</span>
<strong id="multiplier">1.00x</strong>
</div>

</section>

<section class="mines-grid" id="grid"></section>

</div>
</div>

<script src="script.js"></script>

<script>
let gameActive = false
let betAmount = 0
let mineTotal = 3
let revealed = 0
let multiplier = 1
let mines = []

const grid = document.getElementById("grid")
const betInput = document.getElementById("betInput")
const mineSelect = document.getElementById("mineCount")
const startBtn = document.getElementById("startGame")
const cashoutBtn = document.getElementById("cashoutGame")
const multiplierEl = document.getElementById("multiplier")

function createGrid() {
grid.innerHTML = ""
for (let i = 0; i < 25; i++) {
const tile = document.createElement("div")
tile.className = "mine-tile"
tile.dataset.index = i
tile.addEventListener("click", () => onTileClick(i, tile))
grid.appendChild(tile)
}
}

function startGame() {
if (gameActive) return

betAmount = Number(betInput.value)
mineTotal = Number(mineSelect.value)

if (!placeBet(betAmount)) {
showTempMessage("Insufficient balance")
return
}

gameActive = true
revealed = 0
multiplier = 1
multiplierEl.innerText = "1.00x"

mines = Array(25).fill(false)
let placed = 0

while (placed < mineTotal) {
let idx = randomInt(0, 24)
if (!mines[idx]) {
mines[idx] = true
placed++
}
}

createGrid()
cashoutBtn.disabled = false
startBtn.disabled = true
}

function onTileClick(index, tile) {
if (!gameActive) return
if (tile.classList.contains("revealed")) return

tile.classList.add("revealed")

if (mines[index]) {
tile.classList.add("mine")
tile.innerText = "💣"
endGame(false)
return
}

tile.classList.add("safe")
tile.innerText = "💎"
revealed++
updateMultiplier()
}

function updateMultiplier() {
const safeTiles = 25 - mineTotal
multiplier = 1 + (revealed / safeTiles) * mineTotal * 0.9
multiplierEl.innerText = multiplier.toFixed(2) + "x"
}

function cashout() {
if (!gameActive) return
const payoutAmount = betAmount * multiplier
payout(payoutAmount)
showTempMessage("Cashed out $" + payoutAmount.toFixed(2))
endGame(true)
}

function revealAll() {
const tiles = document.querySelectorAll(".mine-tile")
tiles.forEach((tile, i) => {
if (mines[i]) {
tile.classList.add("mine")
tile.innerText = "💣"
} else {
tile.classList.add("safe")
tile.innerText = "💎"
}
})
}

function endGame(won) {
gameActive = false
cashoutBtn.disabled = true
startBtn.disabled = false
revealAll()

if (!won) {
showTempMessage("You hit a mine")
}
}

startBtn.addEventListener("click", startGame)
cashoutBtn.addEventListener("click", cashout)

createGrid()
renderBalance()
</script>

<style>
.mines-controls {
display:flex;
flex-wrap:wrap;
gap:20px;
margin-bottom:24px;
align-items:flex-end;
}

.control-group {
display:flex;
flex-direction:column;
gap:6px;
}

.control-group label {
font-size:13px;
color:var(--text-muted);
}

.control-group input,
.control-group select {
padding:10px;
border-radius:10px;
border:none;
background:var(--bg-card);
color:var(--text-main);
font-size:14px;
}

.control-group.buttons {
flex-direction:row;
gap:12px;
}

.control-group button {
padding:12px 18px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:600;
}

#startGame {
background:var(--accent);
color:#fff;
}

#cashoutGame {
background:var(--success);
color:#000;
}

#cashoutGame:disabled {
opacity:.5;
cursor:not-allowed;
}

.multiplier-display {
margin-left:auto;
font-size:18px;
font-weight:700;
}

.mines-grid {
display:grid;
grid-template-columns:repeat(5, 1fr);
gap:12px;
max-width:420px;
}

.mine-tile {
aspect-ratio:1;
background:var(--bg-card);
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
transition:.15s;
}

.mine-tile:hover {
background:var(--bg-hover);
}

.mine-tile.revealed {
cursor:default;
}

.mine-tile.safe {
background:#1e402b;
}

.mine-tile.mine {
background:#4b1e1e;
}
</style>

</body>
</html>
