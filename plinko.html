<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plinko — Nightfall Casino</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

<header id="topbar">
<div class="top-left">
<a href="index.html" class="logo">
<span class="logo-icon">♠</span>
<span class="logo-text">Nightfall</span>
</a>
</div>

<div class="top-right">
<div class="wallet">
<span class="wallet-label">Balance</span>
<span class="wallet-amount" id="balanceDisplay">$0.00</span>
</div>
</div>
</header>

<div id="content">

<section class="hero">
<div class="hero-text">
<h1>Plinko</h1>
<p>
Drop the ball through the pegs. Where it lands decides your multiplier.
</p>
</div>
</section>

<section class="plinko-controls">

<div class="control-group">
<label>Bet Amount</label>
<input type="number" id="betInput" value="10" min="1">
</div>

<div class="control-group">
<label>Risk</label>
<select id="riskSelect">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>
</div>

<div class="control-group buttons">
<button id="dropButton">Drop Ball</button>
</div>

<div class="plinko-info">
<span>Result</span>
<strong id="resultText">—</strong>
</div>

</section>

<section class="plinko-board-wrapper">
<div class="plinko-board" id="board"></div>
<div class="plinko-slots" id="slots"></div>
</section>

</div>
</div>

<script src="script.js"></script>

<script>
const board = document.getElementById("board")
const slotsEl = document.getElementById("slots")
const dropButton = document.getElementById("dropButton")
const betInput = document.getElementById("betInput")
const riskSelect = document.getElementById("riskSelect")
const resultText = document.getElementById("resultText")

let dropping = false
let rows = 10
let slotMultipliers = []

function getMultipliers(risk) {
if (risk === "low") return [0.5,0.8,1,1.2,1.5,1.2,1,0.8,0.5]
if (risk === "medium") return [0.3,0.6,0.9,1.3,2,1.3,0.9,0.6,0.3]
return [0.2,0.4,0.7,1.5,3,1.5,0.7,0.4,0.2]
}

function buildBoard() {
board.innerHTML = ""
slotsEl.innerHTML = ""
slotMultipliers = getMultipliers(riskSelect.value)

for (let r = 0; r < rows; r++) {
for (let c = 0; c <= r; c++) {
const peg = document.createElement("div")
peg.className = "peg"
peg.style.top = `${r * 36}px`
peg.style.left = `${(board.clientWidth / 2) - (r * 18) + (c * 36)}px`
board.appendChild(peg)
}
}

slotMultipliers.forEach(mult => {
const slot = document.createElement("div")
slot.className = "slot"
slot.innerText = mult + "x"
slotsEl.appendChild(slot)
})
}

function dropBall() {
if (dropping) return

const bet = Number(betInput.value)
if (!placeBet(bet)) {
showTempMessage("Insufficient balance")
return
}

dropping = true
resultText.innerText = "Dropping"

const ball = document.createElement("div")
ball.className = "ball"
board.appendChild(ball)

let position = Math.floor(slotMultipliers.length / 2)
let y = 0

ball.style.left = `${board.clientWidth / 2}px`
ball.style.top = "0px"

let step = 0
const interval = setInterval(() => {
y += 36
if (Math.random() < 0.5) position--
else position++

position = clamp(position, 0, slotMultipliers.length - 1)

ball.style.left = `${(board.clientWidth / 2) + (position - slotMultipliers.length/2) * 36}px`
ball.style.top = `${y}px`

step++
if (step >= rows) {
clearInterval(interval)
finishDrop(ball, bet, position)
}
}, 120)
}

function finishDrop(ball, bet, index) {
const mult = slotMultipliers[index]
const payoutAmount = bet * mult

if (payoutAmount > 0) payout(payoutAmount)

resultText.innerText = mult.toFixed(2) + "x"

setTimeout(() => {
ball.remove()
dropping = false
}, 800)
}

dropButton.addEventListener("click", dropBall)
riskSelect.addEventListener("change", buildBoard)

buildBoard()
renderBalance()
</script>

<style>
.plinko-controls {
display:flex;
flex-wrap:wrap;
gap:20px;
margin-bottom:30px;
align-items:flex-end;
}

.plinko-info {
margin-left:auto;
font-size:18px;
font-weight:700;
}

.plinko-board-wrapper {
display:flex;
flex-direction:column;
align-items:center;
gap:14px;
}

.plinko-board {
position:relative;
width:420px;
height:380px;
background:var(--bg-card);
border-radius:14px;
box-shadow:var(--shadow-card);
overflow:hidden;
}

.peg {
position:absolute;
width:10px;
height:10px;
border-radius:50%;
background:var(--text-muted);
}

.ball {
position:absolute;
width:16px;
height:16px;
border-radius:50%;
background:var(--accent);
transform:translateX(-50%);
transition:left .12s linear, top .12s linear;
}

.plinko-slots {
display:grid;
grid-template-columns:repeat(9,1fr);
width:420px;
gap:6px;
}

.slot {
background:var(--bg-card);
padding:10px 0;
text-align:center;
border-radius:10px;
font-weight:600;
box-shadow:var(--shadow-card);
}

#dropButton {
background:var(--accent);
color:#fff;
}
</style>

</body>
</html>
